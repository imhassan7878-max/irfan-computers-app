name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract app ZIP
        run: unzip -o Irfan_Computers_Android_CloudBuild_v1.zip

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix and build APK
        run: |
          cd irfan_computers_app
          flutter create --platforms=android .
          flutter pub get
          sed -i '312d' lib/main.dart
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Irfan-Computers-APK
          path: irfan_computers_app/build/app/outputs/flutter-apk/app-release.apk
